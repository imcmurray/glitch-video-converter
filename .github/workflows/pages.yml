name: Deploy converter to GitHub Pages

# Rebuild index.html from glitch_processor.py and publish it, so the hosted app
# is always in sync with the source. Runs on every push to main (and on demand).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install numpy

      - name: Build the converter page
        run: |
          mkdir -p _site
          python3 glitch_processor.py --build-web _site/index.html
          echo "Built _site/index.html ($(wc -c < _site/index.html) bytes)"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
